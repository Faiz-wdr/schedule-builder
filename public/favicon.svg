<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
  </defs>
  <!-- Rounded base container -->
  <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#grad)" />
  <!-- Calendar top binder and rings -->
  <path d="M6 6.5h12" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <path d="M8 4.5v3M16 4.5v3" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />
  <!-- Calendar sheet outline -->
  <rect x="5" y="9" width="14" height="10" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.8" />
  <!-- Grid slot lines (filled competitions) -->
  <line x1="8" y1="12" x2="12" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="8" y1="15" x2="11" y2="15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="14" y1="12" x2="16" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <!-- Clock indicator overlap -->
  <circle cx="16" cy="15.5" r="3.5" fill="#22C55E" stroke="#ffffff" stroke-width="1.2" />
  <path d="M16 14v1.5h1" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
